<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ריצה חכמה">
<meta name="theme-color" content="#080810">
<title>ריצה חכמה 🏃</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --warmup: #f59e0b;
  --run: #ff3d3d;
  --walk: #00d97e;
  --done: #818cf8;
  --bg: #080810;
  --card: #0f0f1a;
  --input: #161625;
  --text: #eef2ff;
  --muted: #4a5270;
  --border: #1a1a2e;
  --phase: var(--run);
  --phase-glow: rgba(255,61,61,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  -webkit-font-smoothing: antialiased;
}

/* ── Safe area ── */
.safe-top { padding-top: max(16px, env(safe-area-inset-top)); }
.safe-bottom { padding-bottom: max(16px, env(safe-area-inset-bottom)); }

/* ── Screens ── */
.screen {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
  background: var(--bg);
  transition: opacity 0.3s ease;
}
.screen.active { display: flex; }
.screen-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 0 20px 40px;
}

/* ── Phase glow bg ── */
#phase-glow {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%, var(--phase-glow) 0%, transparent 70%);
  transition: background 1.5s ease;
}

/* ── Typography ── */
h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; }
h2 { font-size: 20px; font-weight: 800; }

/* ── Cards ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 14px;
}
.card-title {
  font-size: 16px; font-weight: 800;
  margin-bottom: 4px; color: var(--text);
}
.card-hint {
  font-size: 12px; color: var(--muted);
  margin-bottom: 14px; line-height: 1.5;
}

/* ── Buttons ── */
.btn-primary {
  width: 100%; padding: 18px;
  background: var(--run); border: none; border-radius: 16px;
  color: #fff; font-family: 'Heebo', sans-serif;
  font-size: 19px; font-weight: 800; cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
}
.btn-primary:active { transform: scale(0.97); opacity: 0.9; }
.btn-ghost {
  background: none; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 8px 14px;
  color: var(--muted); font-family: 'Heebo', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.btn-icon {
  background: var(--input); border: 1px solid var(--border);
  border-radius: 8px; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--muted);
  flex-shrink: 0;
}
.btn-icon:active { opacity: 0.7; }

/* ── Top bar ── */
.top-bar {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 12px 20px 8px;
  flex-shrink: 0;
}

/* ── Phase row (setup) ── */
.phase-row {
  display: flex; align-items: center;
  gap: 8px; margin-bottom: 10px;
  background: var(--input);
  border-radius: 12px; padding: 10px 12px;
  border-right: 3px solid var(--phase-row-color, var(--run));
}
.phase-type-btn {
  display: flex; align-items: center; gap: 5px;
  border: 1.5px solid var(--phase-row-color, var(--run));
  border-radius: 8px; padding: 5px 9px;
  background: none; cursor: pointer;
  font-family: 'Heebo', sans-serif;
  font-size: 12px; font-weight: 700;
  color: var(--phase-row-color, var(--run));
  white-space: nowrap; flex-shrink: 0;
}
.phase-min-wrap {
  display: flex; align-items: center; gap: 4px;
  flex: 1; justify-content: center;
}
.phase-min-input {
  width: 52px; text-align: center;
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  font-family: 'Heebo', sans-serif; font-size: 20px; font-weight: 800;
  padding: 5px 0; outline: none;
}
.phase-min-label { color: var(--muted); font-size: 13px; }
.phase-move-btns { display: flex; flex-direction: column; gap: 2px; }
.phase-move-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 13px; font-weight: 700;
  padding: 2px 4px; line-height: 1;
}
.phase-move-btn:disabled { opacity: 0.2; }
.phase-del-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 16px; padding: 4px;
}

/* ── Add row ── */
.add-row {
  display: flex; gap: 8px; margin-bottom: 14px;
  flex-direction: row-reverse;
}
.add-btn {
  flex: 1; border-radius: 10px; padding: 10px 0;
  border: 1.5px solid; background: none; cursor: pointer;
  font-family: 'Heebo', sans-serif; font-size: 12px; font-weight: 700;
}

/* ── Repeat control ── */
.repeat-row {
  display: flex; align-items: center; gap: 14px;
  flex-direction: row-reverse;
}
.repeat-btn {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--bg); border: 1.5px solid var(--border);
  font-size: 24px; font-weight: 300; cursor: pointer;
  color: var(--text); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.repeat-count {
  font-size: 36px; font-weight: 900;
  min-width: 50px; text-align: center; color: var(--text);
}
.repeat-label { color: var(--muted); font-size: 14px; flex: 1; text-align: left; }

/* ── Summary box ── */
.summary-box {
  background: var(--card); border: 1.5px solid var(--done);
  border-radius: 14px; padding: 14px; margin-bottom: 20px;
  text-align: center;
}
.summary-main { font-size: 20px; font-weight: 800; }
.summary-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

/* ── Timer screen ── */
#screen-timer {
  align-items: center; justify-content: center;
  padding: 0 24px;
}
.timer-top {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px;
  padding-top: max(16px, env(safe-area-inset-top));
}
.timer-exit {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-family: 'Heebo', sans-serif;
  font-size: 15px; padding: 6px;
}
.timer-elapsed { color: var(--muted); font-size: 15px; font-weight: 600; }
.timer-step { color: var(--muted); font-size: 15px; font-weight: 600; margin-bottom: 10px; }
.timer-phase-label {
  font-size: 26px; font-weight: 800; margin-bottom: 24px;
  text-align: center; transition: color 0.8s ease;
  color: var(--phase);
}
/* ── SVG circle timer ── */
.timer-circle-wrap {
  position: relative; width: 260px; height: 260px;
  margin-bottom: 20px; flex-shrink: 0;
}
.timer-svg { width: 260px; height: 260px; transform: rotate(-90deg); }
.timer-track { fill: none; stroke: var(--border); stroke-width: 7; }
.timer-ring {
  fill: none; stroke-width: 7; stroke-linecap: round;
  stroke: var(--phase);
  stroke-dasharray: 659.7;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear, stroke 0.8s ease;
}
.timer-text-wrap {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.timer-countdown {
  font-size: 60px; font-weight: 900; letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
  color: var(--phase); transition: color 0.8s ease;
  line-height: 1;
}
.timer-countdown.done-emoji { font-size: 52px; letter-spacing: 0; }
/* ── Distance ── */
.distance-badge {
  text-align: center; margin-bottom: 14px;
}
.distance-val { font-size: 19px; font-weight: 700; }
.distance-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
/* ── Dots ── */
.dots-row {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 6px; margin-bottom: 28px; max-width: 300px;
}
.dot {
  height: 10px; border-radius: 5px;
  transition: background 0.4s, width 0.3s;
  width: 10px;
}
.dot.active { width: 18px; }
/* ── Pause btn ── */
.pause-btn {
  border: 2px solid var(--phase); border-radius: 14px;
  background: none; padding: 16px 52px;
  font-family: 'Heebo', sans-serif; font-size: 19px; font-weight: 700;
  color: var(--phase); cursor: pointer;
  transition: border-color 0.8s, color 0.8s;
}
.pause-btn:active { opacity: 0.7; }

/* ── Done overlay ── */
.done-stats {
  color: var(--muted); font-size: 14px;
  margin-top: 20px; text-align: center; line-height: 2;
}

/* ── Bank screen ── */
.bank-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px 0;
  padding-top: max(12px, env(safe-area-inset-top));
}
.bank-title { font-size: 20px; font-weight: 800; }
.bank-tabs {
  display: flex; flex-direction: row-reverse;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px; flex-shrink: 0;
}
.bank-tab {
  flex: 1; padding: 10px 0; text-align: center;
  background: none; border: none; cursor: pointer;
  font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--muted); border-bottom: 2.5px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  margin-bottom: -1px;
}
.bank-tab.active { color: var(--phase); border-bottom-color: var(--phase); }
.bank-list { flex: 1; overflow-y: auto; padding: 0 20px; }
.bank-hint { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
.msg-row {
  display: flex; align-items: center; flex-direction: row-reverse;
  gap: 10px; background: var(--card);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 8px;
}
.msg-text { flex: 1; font-size: 14px; text-align: right; line-height: 1.4; }
.msg-del { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 2px; }
.bank-input-row {
  display: flex; flex-direction: row-reverse; gap: 10px;
  padding: 12px 20px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  border-top: 1px solid var(--border); flex-shrink: 0;
  background: var(--bg);
}
.bank-input {
  flex: 1; background: var(--input); color: var(--text);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 14px; font-family: 'Heebo', sans-serif; font-size: 15px;
  direction: rtl; outline: none;
}
.bank-add-btn {
  width: 50px; border-radius: 12px; border: none;
  font-size: 26px; font-weight: 300; cursor: pointer; color: #fff;
  transition: opacity 0.2s;
}
.bank-add-btn:disabled { opacity: 0.3; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Install hint ── */
.install-hint {
  font-size: 12px; color: var(--muted); text-align: center;
  padding: 8px 20px 0; line-height: 1.5;
}
</style>
</head>
<body>

<div id="phase-glow"></div>

<!-- ═══════════════════════════════════════════
     SETUP SCREEN
════════════════════════════════════════════ -->
<div class="screen active safe-top safe-bottom" id="screen-setup">
  <div class="top-bar" style="padding-bottom:4px">
    <h1>ריצה חכמה 🏃</h1>
    <button class="btn-ghost" onclick="goBank()">💬 הודעות</button>
  </div>
  <p style="color:var(--muted);font-size:14px;padding:0 20px 16px">בנה את האימון שלך</p>

  <div class="screen-scroll" id="setup-scroll">

    <!-- Phase list -->
    <div class="card">
      <div class="card-title">📋 שלבי האימון</div>
      <div class="card-hint">לחץ על הסמל לשינוי סוג | חצים לסידור מחדש</div>
      <div id="phase-list"></div>
    </div>

    <!-- Add buttons -->
    <div class="add-row" id="add-row"></div>

    <!-- Repeat control -->
    <div class="card" id="repeat-card" style="display:none">
      <div class="card-title">🔁 חזרות</div>
      <div class="card-hint">השלב הראשון יתבצע פעם אחת בלבד.<br>שאר השלבים יחזרו X פעמים.</div>
      <div class="repeat-row">
        <button class="repeat-btn" onclick="changeRepeat(-1)">−</button>
        <div class="repeat-count" id="repeat-display">1</div>
        <button class="repeat-btn" onclick="changeRepeat(1)">+</button>
        <div class="repeat-label" id="repeat-label">סבב אחד</div>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary-box" id="summary-box" style="display:none">
      <div class="summary-main" id="summary-main"></div>
      <div class="summary-sub" id="summary-sub"></div>
    </div>

    <button class="btn-primary" onclick="startWorkout()">התחל אימון</button>

    <div class="install-hint" id="install-hint"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     TIMER SCREEN
════════════════════════════════════════════ -->
<div class="screen" id="screen-timer">
  <div class="timer-top safe-top">
    <button class="timer-exit" onclick="confirmExit()">✕ סיים</button>
    <div class="timer-elapsed" id="timer-elapsed">00:00</div>
  </div>

  <div id="timer-step" class="timer-step"></div>
  <div id="timer-phase-label" class="timer-phase-label">ריצה 🏃</div>

  <!-- Circle -->
  <div class="timer-circle-wrap">
    <svg class="timer-svg" viewBox="0 0 260 260">
      <circle class="timer-track" cx="130" cy="130" r="105"/>
      <circle class="timer-ring" id="timer-ring" cx="130" cy="130" r="105"/>
    </svg>
    <div class="timer-text-wrap">
      <div class="timer-countdown" id="timer-countdown">00:00</div>
    </div>
  </div>

  <!-- Distance -->
  <div class="distance-badge" id="distance-badge">
    <div class="distance-val" id="distance-val">📡 מחפש GPS...</div>
    <div class="distance-lbl" id="distance-lbl" style="display:none">מרחק כולל</div>
  </div>

  <!-- Progress dots -->
  <div class="dots-row" id="dots-row"></div>

  <!-- Controls -->
  <button class="pause-btn" id="pause-btn" onclick="togglePause()">⏸ עצור</button>

  <!-- Done state (hidden until done) -->
  <div id="done-stats" class="done-stats" style="display:none"></div>
</div>

<!-- ═══════════════════════════════════════════
     BANK SCREEN
════════════════════════════════════════════ -->
<div class="screen" id="screen-bank" style="overflow:hidden">
  <div class="bank-header safe-top">
    <div class="bank-title">💬 בנק הודעות</div>
    <div style="display:flex;gap:8px">
      <button class="btn-ghost" onclick="resetBank()" style="font-size:12px">איפוס</button>
      <button class="btn-ghost" onclick="goSetup()">← חזור</button>
    </div>
  </div>
  <div class="bank-tabs" id="bank-tabs"></div>
  <div class="bank-list" id="bank-list">
    <div class="bank-hint" id="bank-hint"></div>
    <div id="bank-msgs"></div>
  </div>
  <div class="bank-input-row">
    <input class="bank-input" id="bank-input" type="text" placeholder="הוסף הודעה..." dir="rtl">
    <button class="bank-add-btn" id="bank-add-btn" onclick="addBankMsg()" disabled>+</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════
const PHASE_TYPES = ['warmup', 'run', 'walk'];
const PHASE_META = {
  warmup: { label: 'חימום',  emoji: '🚶', color: '#f59e0b', cssVar: '--warmup' },
  run:    { label: 'ריצה',   emoji: '🏃', color: '#ff3d3d', cssVar: '--run'    },
  walk:   { label: 'הליכה', emoji: '🚶', color: '#00d97e', cssVar: '--walk'   },
};
const CIRCLE_R = 105;
const CIRCLE_C = 2 * Math.PI * CIRCLE_R; // 659.7

const BANK_KEY    = 'running_bank_v1';
const WORKOUT_KEY = 'running_workout_v1';

const DEFAULT_BANK = {
  run: [
    'אלוף שכמותך, תמשיך ככה!',
    'יאללה מלך, אתה שורף אותה!',
    'תראה אותך רץ, מגעיל כמה שאתה טוב!',
    'בן אדם, אתה מכונה!',
    'מי שרואה אותך עכשיו מתבייש שהוא לא רץ!',
    'הרגליים יודעות מה לעשות, תן להן לרוץ!',
  ],
  walk: [
    'תנשום עמוק, מגיע לך!',
    'מנוחה היא חלק מהאימון, אלוף!',
    'ישר לב, כתפיים אחורה, הליכה מלכותית!',
    'תיקח אוויר טוב לסבב הבא!',
  ],
  warmup: [
    'חימום טוב — שרירים מאושרים!',
    'קדימה, עוד קצת חימום ואז יש כיף!',
  ],
};

const DONE_MSGS = [
  'סיימת! ימטורף כמה שאתה טוב!',
  'כל הכבוד! אלוף אמיתי!',
  'מגעיל כמה שאתה חזק!',
  'יאללה גיבור! האימון הסתיים!',
];

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let phases = [
  { id: 1, type: 'warmup', secs: 300 },
  { id: 2, type: 'run',    secs: 120 },
  { id: 3, type: 'walk',   secs: 60  },
];
let repeat = 1;
let nextId = 4;
let bank = null;
let activeBankTab = 'run';

// Timer state
let expandedPhases = [];
let phaseIdx = 0;
let timeLeft = 0;
let totalElapsed = 0;
let isRunning = false;
let isDone = false;
let timerInterval = null;
let lastTick = 0;
let halfAnnounced = false;
let lastAnnouncedAt = 0;

// GPS state
let totalDistance = 0;
let lastPos = null;
let geoWatch = null;
let gpsStatus = 'requesting'; // requesting | active | denied

// Wake lock
let audioCtx = null;

// ════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════
function loadBank() {
  try {
    const raw = localStorage.getItem(BANK_KEY);
    bank = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULT_BANK));
  } catch { bank = JSON.parse(JSON.stringify(DEFAULT_BANK)); }
}
function saveBank() {
  localStorage.setItem(BANK_KEY, JSON.stringify(bank));
}
function loadWorkout() {
  try {
    const raw = localStorage.getItem(WORKOUT_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.phases?.length) { phases = saved.phases; nextId = Math.max(...phases.map(p=>p.id)) + 1; }
      if (saved.repeat) repeat = saved.repeat;
    }
  } catch {}
}
function saveWorkout() {
  localStorage.setItem(WORKOUT_KEY, JSON.stringify({ phases, repeat }));
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randFrom(type) {
  const msgs = bank?.[type];
  return msgs?.length ? rand(msgs) : rand(DEFAULT_BANK[type] || ['קדימה!']);
}

function formatTime(s) {
  s = Math.max(0, Math.round(s));
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function formatDist(m) {
  if (m < 10) return '';
  return m < 1000 ? `${Math.round(m)} מ׳` : `${(m/1000).toFixed(2)} ק"מ`;
}

function formatDuration(secs) {
  const m = Math.floor(secs / 60), s = secs % 60;
  if (m === 0) return `${s} שניות`;
  if (s === 0) return `${m === 1 ? 'דקה' : m + ' דקות'}`;
  return `${m} דקות ו-${s} שניות`;
}

function timeAwareMsg(elapsedInPhase, remainInPhase, motivational) {
  const parts = [];
  if (elapsedInPhase >= 60) parts.push(`עברו ${formatDuration(elapsedInPhase)}`);
  if (remainInPhase > 5)    parts.push(`נשאר ${formatDuration(remainInPhase)}`);
  return parts.length ? `${parts.join(', ')} — ${motivational}` : motivational;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, r = d => d * Math.PI / 180;
  const a = Math.sin(r(lat2-lat1)/2)**2 +
    Math.cos(r(lat1)) * Math.cos(r(lat2)) * Math.sin(r(lon2-lon1)/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ════════════════════════════════════════════
// SPEECH
// ════════════════════════════════════════════
let speechQueue = [];
let isSpeaking = false;

function speak(text) {
  speechQueue = [text]; // replace queue (latest wins)
  processSpeech();
}

function processSpeech() {
  if (isSpeaking || !speechQueue.length) return;
  const text = speechQueue.shift();
  isSpeaking = true;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'he-IL';
  utt.rate = 0.95;
  utt.pitch = 1.0;
  // Find Hebrew voice
  const voices = window.speechSynthesis.getVoices();
  const heVoice = voices.find(v => v.lang.startsWith('he'));
  if (heVoice) utt.voice = heVoice;
  utt.onend = utt.onerror = () => { isSpeaking = false; processSpeech(); };
  window.speechSynthesis.speak(utt);
}

// iOS: voices load async
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
  // iOS resumption hack
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && isRunning) window.speechSynthesis.resume();
  });
}

// ════════════════════════════════════════════
// WAKE LOCK (silent audio — works on iOS)
// ════════════════════════════════════════════
function startWakeLock() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    gain.gain.value = 0.001;
    osc.frequency.value = 1;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
  } catch(e) {}
}
function stopWakeLock() {
  try { audioCtx?.close(); audioCtx = null; } catch(e) {}
}

// ════════════════════════════════════════════
// GPS
// ════════════════════════════════════════════
function startGPS() {
  if (!navigator.geolocation) { gpsStatus = 'denied'; updateDistanceUI(); return; }
  geoWatch = navigator.geolocation.watchPosition(
    pos => {
      if (!isRunning) return;
      const { latitude: lat, longitude: lon } = pos.coords;
      if (lastPos) {
        const d = haversine(lastPos.lat, lastPos.lon, lat, lon);
        if (d < 50) totalDistance += d;
      }
      lastPos = { lat, lon };
      gpsStatus = 'active';
      updateDistanceUI();
    },
    () => { gpsStatus = 'denied'; updateDistanceUI(); },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
  );
}
function stopGPS() {
  if (geoWatch != null) { navigator.geolocation.clearWatch(geoWatch); geoWatch = null; }
}
function updateDistanceUI() {
  const val = document.getElementById('distance-val');
  const lbl = document.getElementById('distance-lbl');
  if (!val) return;
  if (gpsStatus === 'denied') { val.textContent = 'ללא GPS'; lbl.style.display = 'none'; return; }
  if (gpsStatus === 'requesting') { val.textContent = '📡 מחפש GPS...'; lbl.style.display = 'none'; return; }
  const d = formatDist(totalDistance);
  if (!d) { val.textContent = '📍 0 מ׳'; lbl.style.display = 'none'; return; }
  val.textContent = `📍 ${d}`;
  lbl.style.display = 'block';
}

// ════════════════════════════════════════════
// PHASE COLOR
// ════════════════════════════════════════════
function applyPhaseColor(type) {
  const meta = PHASE_META[type] || PHASE_META.run;
  const c = meta.color;
  document.documentElement.style.setProperty('--phase', c);
  document.documentElement.style.setProperty('--phase-glow', hexToRgba(c, 0.13));
  document.getElementById('phase-glow').style.display = 'block';
}
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ════════════════════════════════════════════
// TIMER LOGIC
// ════════════════════════════════════════════
function buildExpandedPhases() {
  const first = phases[0];
  const rest = phases.slice(1);
  const exp = [{ ...first, eid: 'e-0-0' }];
  for (let r = 0; r < repeat; r++) {
    rest.forEach((ph, i) => exp.push({ ...ph, eid: `e-${r}-${i+1}` }));
  }
  return exp;
}

function startWorkout() {
  saveWorkout();
  expandedPhases = buildExpandedPhases();
  phaseIdx = 0;
  totalElapsed = 0;
  totalDistance = 0;
  lastPos = null;
  isDone = false;
  gpsStatus = 'requesting';

  const first = expandedPhases[0];
  timeLeft = first.secs;
  halfAnnounced = false;
  lastAnnouncedAt = 0;

  startWakeLock();
  startGPS();
  goTimer();
  buildTimerDots();
  updateTimerUI();
  applyPhaseColor(first.type);

  // Start ticking after short delay (let screen render)
  isRunning = true;
  lastTick = Date.now();
  timerInterval = setInterval(tick, 500);

  const meta = PHASE_META[first.type];
  speak(`מתחילים ${meta.label}. קדימה!`);
}

function tick() {
  if (!isRunning) return;
  const now = Date.now();
  const elapsed = (now - lastTick) / 1000;
  lastTick = now;

  if (elapsed < 0.3 || elapsed > 3) return; // sanity check

  totalElapsed += elapsed;
  timeLeft -= elapsed;

  // Countdown 3-2-1
  const tl = Math.ceil(timeLeft);
  if (tl === 3 && Math.ceil(timeLeft + elapsed) === 4) speak('שלוש');
  else if (tl === 2 && Math.ceil(timeLeft + elapsed) === 3) speak('שתיים');
  else if (tl === 1 && Math.ceil(timeLeft + elapsed) === 2) speak('אחת');

  const curPhase = expandedPhases[phaseIdx];
  const elapsedInPhase = curPhase.secs - timeLeft;
  const sinceAnnounce = totalElapsed - lastAnnouncedAt;

  // 30s warning
  if (tl === 30 && Math.ceil(timeLeft + elapsed) > 30) {
    const msg = timeAwareMsg(Math.round(elapsedInPhase), 30, randFrom(curPhase.type));
    speak(msg); lastAnnouncedAt = totalElapsed;
  }
  // Halfway (phases ≥ 2 min)
  else if (!halfAnnounced && curPhase.secs >= 120) {
    const half = curPhase.secs / 2;
    if (elapsedInPhase >= half && elapsedInPhase - elapsed < half) {
      halfAnnounced = true;
      const msg = timeAwareMsg(Math.round(elapsedInPhase), Math.round(timeLeft), randFrom(curPhase.type));
      speak(msg); lastAnnouncedAt = totalElapsed;
    }
  }
  // 3-minute silence rule
  else if (sinceAnnounce >= 180 && timeLeft > 10) {
    const msg = timeAwareMsg(Math.round(elapsedInPhase), Math.round(timeLeft), randFrom(curPhase.type));
    speak(msg); lastAnnouncedAt = totalElapsed;
  }

  // Phase done?
  if (timeLeft <= 0) {
    advancePhase();
    return;
  }

  updateTimerUI();
}

function advancePhase() {
  // Vibrate if supported
  try { navigator.vibrate?.(400); } catch {}

  const next = phaseIdx + 1;
  if (next >= expandedPhases.length) {
    // DONE
    isDone = true;
    isRunning = false;
    clearInterval(timerInterval);
    stopGPS();
    stopWakeLock();
    speak(rand(DONE_MSGS));
    try { navigator.vibrate?.([400,200,400,200,600]); } catch {}
    showDoneUI();
  } else {
    phaseIdx = next;
    halfAnnounced = false;
    lastAnnouncedAt = totalElapsed;
    const ph = expandedPhases[next];
    timeLeft = ph.secs;
    applyPhaseColor(ph.type);
    const meta = PHASE_META[ph.type];
    speak(`${meta.label}! ${ph.type === 'run' ? 'קדימה!' : 'נשמו.'}`);
    updateTimerUI();
  }
}

function togglePause() {
  if (isDone) return;
  isRunning = !isRunning;
  if (isRunning) {
    lastTick = Date.now();
    lastAnnouncedAt = totalElapsed;
    speak('ממשיכים!');
  } else {
    lastPos = null; // pause GPS accumulation
    speak('הפסקה');
  }
  document.getElementById('pause-btn').textContent = isRunning ? '⏸ עצור' : '▶ המשך';
}

function confirmExit() {
  if (confirm('לסיים את האימון?')) exitTimer();
}
function exitTimer() {
  clearInterval(timerInterval);
  stopGPS();
  stopWakeLock();
  isRunning = false;
  isDone = false;
  window.speechSynthesis?.cancel();
  document.getElementById('phase-glow').style.display = 'none';
  goSetup();
}

// ════════════════════════════════════════════
// TIMER UI
// ════════════════════════════════════════════
function buildTimerDots() {
  const row = document.getElementById('dots-row');
  row.innerHTML = '';
  expandedPhases.forEach((ph, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = `dot-${i}`;
    row.appendChild(d);
  });
}

function updateTimerUI() {
  if (isDone) return;
  const ph = expandedPhases[phaseIdx];
  const meta = PHASE_META[ph.type];
  const tl = Math.max(0, timeLeft);

  // Labels
  document.getElementById('timer-phase-label').textContent = `${meta.label} ${meta.emoji}`;
  document.getElementById('timer-countdown').textContent = formatTime(tl);
  document.getElementById('timer-countdown').className = 'timer-countdown';
  document.getElementById('timer-elapsed').textContent = `⏱ ${formatTime(totalElapsed)}`;
  document.getElementById('timer-step').textContent =
    `שלב ${phaseIdx + 1} מתוך ${expandedPhases.length}`;

  // Circle progress
  const progress = tl / ph.secs;
  const ring = document.getElementById('timer-ring');
  ring.style.strokeDashoffset = CIRCLE_C * (1 - progress);
  ring.style.stroke = meta.color;

  // Dots
  expandedPhases.forEach((p, i) => {
    const d = document.getElementById(`dot-${i}`);
    if (!d) return;
    if (i < phaseIdx) {
      d.style.background = '#00d97e';
      d.classList.remove('active');
    } else if (i === phaseIdx) {
      d.style.background = meta.color;
      d.classList.add('active');
    } else {
      d.style.background = 'var(--border)';
      d.classList.remove('active');
    }
  });

  // Distance
  updateDistanceUI();
}

function showDoneUI() {
  const ph = document.getElementById('timer-phase-label');
  ph.textContent = 'כל הכבוד! 🎉';
  ph.style.color = 'var(--done)';
  document.getElementById('timer-countdown').textContent = '🎉';
  document.getElementById('timer-countdown').className = 'timer-countdown done-emoji';
  document.getElementById('timer-ring').style.stroke = 'var(--done)';
  document.getElementById('timer-ring').style.strokeDashoffset = 0;
  document.documentElement.style.setProperty('--phase', 'var(--done)');

  const dist = formatDist(totalDistance);
  document.getElementById('done-stats').style.display = 'block';
  document.getElementById('done-stats').innerHTML =
    `זמן כולל: ${formatTime(totalElapsed)}<br>` +
    `${expandedPhases.length} שלבים${dist ? '<br>מרחק: ' + dist : ''}`;

  document.getElementById('pause-btn').textContent = 'אימון חדש';
  document.getElementById('pause-btn').onclick = exitTimer;
  document.getElementById('pause-btn').style.borderColor = 'var(--done)';
  document.getElementById('pause-btn').style.color = 'var(--done)';
}

// ════════════════════════════════════════════
// SETUP UI
// ════════════════════════════════════════════
function renderSetup() {
  renderPhaseList();
  renderRepeat();
  renderSummary();
}

function renderPhaseList() {
  const list = document.getElementById('phase-list');
  list.innerHTML = '';
  phases.forEach((ph, i) => {
    const meta = PHASE_META[ph.type];
    const row = document.createElement('div');
    row.className = 'phase-row';
    row.style.setProperty('--phase-row-color', meta.color);
    row.innerHTML = `
      <button class="phase-type-btn" onclick="cyclePhaseType(${i})" style="--phase-row-color:${meta.color};border-color:${meta.color};color:${meta.color}">
        <span>${meta.emoji}</span><span>${meta.label}</span>
      </button>
      <div class="phase-min-wrap">
        <input class="phase-min-input" type="number" min="1" max="180"
          value="${Math.floor(ph.secs/60)}"
          onchange="updatePhaseSecs(${i}, this.value)"
          oninput="updatePhaseSecs(${i}, this.value)">
        <span class="phase-min-label">דק׳</span>
      </div>
      <div class="phase-move-btns">
        <button class="phase-move-btn" onclick="movePhase(${i},-1)" ${i===0?'disabled':''}>↑</button>
        <button class="phase-move-btn" onclick="movePhase(${i},1)" ${i===phases.length-1?'disabled':''}>↓</button>
      </div>
      <button class="phase-del-btn" onclick="removePhase(${i})">✕</button>
    `;
    list.appendChild(row);
  });
}

function renderAddRow() {
  const row = document.getElementById('add-row');
  row.innerHTML = '';
  PHASE_TYPES.forEach(type => {
    const meta = PHASE_META[type];
    const btn = document.createElement('button');
    btn.className = 'add-btn';
    btn.style.borderColor = meta.color;
    btn.style.color = meta.color;
    btn.textContent = `+ ${meta.label}`;
    btn.onclick = () => addPhase(type);
    row.appendChild(btn);
  });
}

function renderRepeat() {
  const card = document.getElementById('repeat-card');
  card.style.display = phases.length > 1 ? 'block' : 'none';
  document.getElementById('repeat-display').textContent = repeat;
  document.getElementById('repeat-label').textContent = repeat === 1 ? 'סבב אחד' : `${repeat} סבבים`;
}

function renderSummary() {
  const box = document.getElementById('summary-box');
  const restSecs = phases.slice(1).reduce((s,p) => s + p.secs, 0);
  const totalSecs = phases[0].secs + restSecs * repeat;
  const totalMin = Math.round(totalSecs / 60);
  if (totalMin <= 0) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  document.getElementById('summary-main').textContent = `סה"כ ~${totalMin} דקות`;
  document.getElementById('summary-sub').textContent =
    `חימום + ${repeat} × (${phases.slice(1).map(p=>p.secs/60+' דק׳').join(' + ')})`;
}

// Phase mutations
function cyclePhaseType(i) {
  const idx = PHASE_TYPES.indexOf(phases[i].type);
  phases[i] = { ...phases[i], type: PHASE_TYPES[(idx+1) % PHASE_TYPES.length] };
  renderSetup();
}
function updatePhaseSecs(i, v) {
  const mins = Math.max(1, parseInt(v) || 1);
  phases[i] = { ...phases[i], secs: mins * 60 };
  renderSummary();
}
function addPhase(type) {
  phases.push({ id: nextId++, type, secs: 60 });
  renderSetup();
}
function removePhase(i) {
  if (phases.length <= 1) return;
  phases.splice(i, 1);
  renderSetup();
}
function movePhase(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= phases.length) return;
  [phases[i], phases[j]] = [phases[j], phases[i]];
  renderSetup();
}
function changeRepeat(delta) {
  repeat = Math.max(1, Math.min(20, repeat + delta));
  renderRepeat();
  renderSummary();
}

// ════════════════════════════════════════════
// BANK UI
// ════════════════════════════════════════════
function renderBank() {
  // Tabs
  const tabsEl = document.getElementById('bank-tabs');
  tabsEl.innerHTML = '';
  PHASE_TYPES.forEach(type => {
    const meta = PHASE_META[type];
    const tab = document.createElement('button');
    tab.className = 'bank-tab' + (type === activeBankTab ? ' active' : '');
    tab.textContent = `${meta.emoji} ${meta.label}`;
    tab.style.setProperty('--phase', meta.color);
    tab.onclick = () => { activeBankTab = type; renderBank(); };
    tabsEl.appendChild(tab);
  });

  // Hint
  const meta = PHASE_META[activeBankTab];
  document.getElementById('bank-hint').textContent =
    `הודעות אלו יושמעו תוך כדי ${meta.label}, עם מידע על זמן שעבר ונשאר.`;

  // Messages
  const msgs = bank[activeBankTab] || [];
  const msgsEl = document.getElementById('bank-msgs');
  msgsEl.innerHTML = '';
  if (!msgs.length) {
    msgsEl.innerHTML = '<p style="text-align:center;color:var(--muted);margin-top:20px;font-size:14px">אין הודעות עדיין</p>';
  }
  msgs.forEach((msg, i) => {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML = `
      <span class="msg-text">${msg}</span>
      <button class="msg-del" onclick="deleteBankMsg(${i})">✕</button>
    `;
    msgsEl.appendChild(row);
  });
}

function addBankMsg() {
  const input = document.getElementById('bank-input');
  const text = input.value.trim();
  if (!text) return;
  if (!bank[activeBankTab]) bank[activeBankTab] = [];
  bank[activeBankTab].push(text);
  saveBank();
  input.value = '';
  document.getElementById('bank-add-btn').disabled = true;
  renderBank();
}

function deleteBankMsg(i) {
  bank[activeBankTab].splice(i, 1);
  saveBank();
  renderBank();
}

function resetBank() {
  if (confirm('לאפס את כל ההודעות לברירת המחדל?')) {
    bank = JSON.parse(JSON.stringify(DEFAULT_BANK));
    saveBank();
    renderBank();
  }
}

// ════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goSetup() { showScreen('screen-setup'); renderSetup(); }
function goTimer() { showScreen('screen-timer'); }
function goBank()  { showScreen('screen-bank');  renderBank(); }

// ════════════════════════════════════════════
// PWA MANIFEST (inject dynamically)
// ════════════════════════════════════════════
function injectManifest() {
  const manifest = {
    name: 'ריצה חכמה',
    short_name: 'ריצה',
    start_url: '.',
    display: 'standalone',
    background_color: '#080810',
    theme_color: '#080810',
    orientation: 'portrait',
    icons: [{
      src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>",
      sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable'
    }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);
}

// ════════════════════════════════════════════
// INSTALL HINT
// ════════════════════════════════════════════
function showInstallHint() {
  const hint = document.getElementById('install-hint');
  const isStandalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  if (!isStandalone) {
    hint.textContent = '💡 לשמירה על מסך הבית: לחץ שתף ← "הוסף למסך הבית"';
  }
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
document.getElementById('bank-input').addEventListener('input', function() {
  document.getElementById('bank-add-btn').disabled = !this.value.trim();
});
document.getElementById('bank-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addBankMsg();
});

loadBank();
loadWorkout();
injectManifest();
renderSetup();
renderAddRow();
showInstallHint();
</script>
